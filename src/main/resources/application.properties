# ============================================================
# CONFIGURACIÓN BASE
# ============================================================
quarkus.http.port=8083
quarkus.http.host=0.0.0.0
quarkus.http.limits.max-body-size=10M
quarkus.http.keep-alive=true
quarkus.http.max-connections=1000

# ============================================================
# PERFIL DESARROLLO (DevServices)
# ============================================================
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=seismic_user
%dev.quarkus.datasource.password=seismic_password
%dev.quarkus.datasource.devservices.image-name=postgres:16-alpine
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=true

# ============================================================
# PERFIL PRODUCCIÓN (Neon PostgreSQL)
# ============================================================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.reactive.url=postgresql://neondb_owner:npg_2Q0NuTEviwdW@ep-dawn-queen-ath6yyg9-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
%prod.quarkus.datasource.username=neondb_owner
%prod.quarkus.datasource.password=npg_2Q0NuTEviwdW
%prod.quarkus.datasource.reactive.max-size=10
%prod.quarkus.datasource.reactive.idle-timeout=PT30S
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.log.sql=false

# ============================================================
# HIBERNATE (General)
# ============================================================
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# ============================================================
# SCHEDULER
# ============================================================
%prod.quarkus.scheduler.enabled=true
quarkus.scheduler.enabled=true
%prod.quarkus.scheduler.thread-pool.core-size=2
%prod.quarkus.scheduler.thread-pool.max-size=5
quarkus.scheduler.every=3s

# ============================================================
# TELEGRAM
# ============================================================
telegram.bot.token=${TELEGRAM_BOT_TOKEN:8966199983:AAFJ69xfUceXgFpklpZpdgwY3oDiu2ewz1I}
telegram.chat.id=${TELEGRAM_CHAT_ID:6976976995}

# ============================================================
# REST CLIENT (USGS)
# ============================================================
quarkus.rest-client.usgs-earthquake-api.url=https://earthquake.usgs.gov
quarkus.log.category."org.eclipse.microprofile.rest.client".level=DEBUG

# ============================================================
# LOGS
# ============================================================
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG
quarkus.log.category."io.smallrye.mutiny".level=DEBUG

# ============================================================
# CORS - ACTIVADO ✅
# ============================================================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin,cache-control,ngrok-skip-browser-warning
quarkus.http.cors.exposed-headers=content-type,cache-control,location,info
quarkus.http.cors.allow-credentials=true
quarkus.http.cors.access-control-max-age=3600

# ============================================================
# HEALTH CHECKS
# ============================================================
%prod.quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.check.ready.enabled=true
quarkus.smallrye-health.check.liveness.enabled=true

# ============================================================
# DOCKER BUILD
# ============================================================
quarkus.container-image.build=true
quarkus.profile=prod

# ============================================================
# IGP API
# ============================================================
igp-api/mp-rest/url=https://ultimosismo.igp.gob.pe
